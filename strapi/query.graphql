query {
  documents {
    title
    relationship_as {
      title
      relationship_b {
        title
      }
    }
    blocks {
      ... on ComponentDocumentRelationToOne {
        text
        relationship_a {
          title
          relationship_b {
            title
          }
        }
      }
      ... on ComponentDocumentHasManyRelations {
        text
        relationship_as {
          title
          relationship_b {
            title
          }
        }
      }
    }
    Group {
      text
      NestedGroup {
        text
      }
    }
    array {
      text
      NestedArray {
        text
        relationship_a {
          title
          relationship_b {
            title
          }
        }
      }
    }
  }
}
